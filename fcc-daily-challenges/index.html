<style>
/* viz-kit.css — the /viz house style. Load with:
     <link rel="stylesheet" href="/_kit/viz-kit.css">
   Served by the viz server at /_kit/viz-kit.css from the skill's own kit/ dir.

   Why this exists: nearly every viz independently re-derived the same dark theme
   (a GitHub-dark palette), re-guessed the exact hexes (so the "same" background
   drifted across files), and invented its own variable names (--txt vs --text vs
   --ink) for identical concepts. This file fixes the palette and the names ONCE so
   you can reach for var(--accent) / var(--good) instead of re-picking colors. The
   house style is dark-only on purpose — it's the look these vizzes converge on. */

:root {
  /* Surfaces, back to front */
  --bg: #0d1117;
  --panel: #161b22;
  --panel-2: #21262d;
  --border: #30363d;

  /* Text */
  --text: #e6edf3;
  --muted: #8b949e;

  /* Intent — accents that carry meaning */
  --accent: #58a6ff; /* primary / links / selection */
  --good: #3fb950; /* success / healthy / "yes" */
  --warn: #d29922; /* caution / pending */
  --danger: #f85149; /* error / blocked / "no" */

  /* Categorical ramp — distinct hues for diagram categories / series.
     Use these when you need N visually separable colors, not meaning. */
  --c1: #58a6ff; /* blue */
  --c2: #3fb950; /* green */
  --c3: #d29922; /* amber */
  --c4: #bc8cff; /* purple */
  --c5: #4ec9b0; /* teal */
  --c6: #f85149; /* red */

  /* Type */
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;

  /* Spacing rhythm */
  --r: 8px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  height: 100%;
}
html {
  /* Paint the canvas itself. body is height:100% (one viewport), so on a page taller
     than the viewport the area BELOW the body box would otherwise reveal the browser's
     default (lighter) canvas when scrolled — showing as a horizontal "line" mid-page
     where body's --bg ends. Putting --bg on the root keeps the whole canvas dark. */
  background-color: var(--bg);
}

body {
  /* A faint top-glow over the flat background — the recurring "radial-gradient at
     60% 0%" idiom, standardized. Sized large and faded to transparent well past the
     fold (color-mix dilutes --panel) so the glow→--bg transition never forms a
     visible edge mid-page — the earlier tight 600px gradient left a "boundary" band. */
  background:
    radial-gradient(1600px 1000px at 50% -30%, color-mix(in srgb, var(--panel) 55%, transparent), transparent 75%),
    var(--bg);
  color: var(--text);
  font: 14px/1.5 var(--sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Header: title + one-line muted subtitle — the chrome ~19/22 vizzes open with. */
.viz-header {
  padding: 20px 24px;
}
.viz-header h1 {
  margin: 0;
  font-size: 20px;
  font-weight: 650;
  letter-spacing: -0.01em;
}
.viz-header .sub,
.sub {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 12.5px;
}

/* Panels / cards */
.panel,
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: calc(var(--r) * 1.5);
  padding: 16px;
}

/* Slide-in detail drawer (click a node → details). Toggle .open. */
.drawer {
  position: fixed;
  top: 0;
  right: 0;
  height: 100%;
  width: min(420px, 90vw);
  background: var(--panel);
  border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform 0.2s ease;
  overflow: auto;
  padding: 20px;
  z-index: 50;
}
.drawer.open {
  transform: none;
}

/* Legend: the single most common component (~16/22), reinvented differently each
   time. Two swatch shapes: a filled square for nodes, a short rule for edge types. */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  font-size: 12px;
  color: var(--muted);
}
.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.swatch {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  flex: none;
  background: var(--accent);
}
.swatch.line {
  width: 16px;
  height: 0;
  border-radius: 0;
  border-top: 2px solid var(--accent);
}

/* Animated "flow" edge — dashed line whose dashes drift along the path. The
   @keyframes was identical everywhere but for the offset magnitude; here it's one
   class. Apply to an SVG <path>/<line>: <path class="flow" .../>. */
@keyframes viz-dash {
  to {
    stroke-dashoffset: -20;
  }
}
.flow {
  stroke-dasharray: 6 4;
  animation: viz-dash 1s linear infinite;
}

/* Auto-wrapping SVG label (see labelBox() in viz.js). Fills its <foreignObject>
   and centers; overflow is clipped, never spilled. */
.vsvg-label {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--text);
  font: 12px/1.25 var(--sans);
  overflow: hidden;
  padding: 2px 6px;
}

<script type="text/plain" data-code="schema">
// A schema is a tiny tagged union; validate() walks value + schema together.
type Schema =
  | { kind: "string" }
  | { kind: "number" }
  | { kind: "boolean" }
  | { kind: "enum"; values: string[] }
  | { kind: "array"; of: Schema }
  | { kind: "object"; fields: Record<string, Schema>; optional?: string[] };

function validate(value: unknown, schema: Schema): boolean {
  switch (schema.kind) {
    case "string":  return typeof value === "string";
    case "number":  return typeof value === "number";
    case "boolean": return typeof value === "boolean";
    case "enum":    return typeof value === "string" && schema.values.includes(value);
    case "array":   return Array.isArray(value) && value.every(v => validate(v, schema.of));
    case "object": {
      if (typeof value !== "object" || value === null || Array.isArray(value)) return false;
      const obj = value as Record<string, unknown>;
      return Object.entries(schema.fields).every(([key, sub]) => {
        if (!(key in obj)) return schema.optional?.includes(key) ?? false; // missing → ok iff optional
        return validate(obj[key], sub);                                    // recurse
      });
      // extra keys are simply never inspected → always allowed
    }
  }
}
</script>

<script type="text/plain" data-code="itinerary">
// Don't enumerate — count. The itinerary is a fixed skeleton with 3 gaps:
//   breakfast · [gap A] · lunch · [gap B] · dinner · [gap C]
// Rules: A >= 1, B >= 1, C in {0, 1}.  Distribute the n distinct stops.
//
//   #compositions of n into (a>=1, b>=1, c in {0,1})  =  (n-1) + (n-2) = 2n - 3
//   each composition then ORDERS all n distinct stops               =  n!
function getItineraryCount(stops: string[]): number {
  const n = stops.length;
  const factorial = (k: number): number => (k <= 1 ? 1 : k * factorial(k - 1));
  return (2 * n - 3) * factorial(n);
}
</script>

<script type="text/plain" data-code="parens">
// "Number of valid combinations" = the nth Catalan number.
// Build strings left-to-right, pruning the moment a string can't be completed:
//   - add '(' only while open < n
//   - add ')' only while close < open   (never let ')' overtake '(')
// Every leaf reached is valid by construction — so just count leaves.
function getCombinations(n: number): number {
  let count = 0;
  const build = (open: number, close: number): void => {
    if (open === n && close === n) { count++; return; } // complete & balanced
    if (open < n)     build(open + 1, close);           // place '('
    if (close < open) build(open, close + 1);           // place ')'
  };
  build(0, 0);
  return count;
}
</script>

<script type="text/plain" data-code="prime">
// Trial division by the SMALLEST factor. Divide it out completely, move on.
// Once d*d > n, whatever remains (> 1) is itself prime.
function primeFactorization(n: number): number[] {
  const factors: number[] = [];
  for (let d = 2; d * d <= n; d++) {
    while (n % d === 0) { factors.push(d); n /= d; }
  }
  if (n > 1) factors.push(n); // the last prime left standing
  return factors;
}
</script>

<script type="text/plain" data-code="luhn">
// Luhn: walk right-to-left, double every SECOND digit, cast nines down by 9,
// sum everything, check divisibility by 10.
function isValidCard(number: string): boolean {
  const sum = [...number]
    .map(Number)
    .reverse()
    .reduce((acc, d, i) => {
      if (i % 2 === 1) { d *= 2; if (d > 9) d -= 9; } // every 2nd from the right
      return acc + d;
    }, 0);
  return sum % 10 === 0;
}
</script>

<script type="text/plain" data-code="besthand">
// Reduce 5 cards to two facts: the shape of the rank groups, and flush/straight.
const RANKS = "23456789TJQKA";
function getBestHand(cards: string[]): string {
  const values = cards.map(c => RANKS.indexOf(c[0])).sort((a, b) => a - b);
  const suits  = cards.map(c => c[1]);

  const groups = [...new Set(values)]                  // e.g. [3,2] = full house,
    .map(v => values.filter(x => x === v).length)      //      [4]   = four of a kind
    .sort((a, b) => b - a);

  const flush    = suits.every(s => s === suits[0]);
  const distinct = new Set(values).size === 5;
  const straight = distinct && (
    values[4] - values[0] === 4 ||                      // ordinary run
    values.join() === "0,1,2,3,12"                      // A-2-3-4-5 (ace low)
  );

  if (straight && flush)             return values[0] === 8 ? "Royal Flush" : "Straight Flush";
  if (groups[0] === 4)               return "Four of a Kind";
  if (groups[0] === 3 && groups[1] === 2) return "Full House";
  if (flush)                         return "Flush";
  if (straight)                      return "Straight";
  if (groups[0] === 3)               return "Three of a Kind";
  if (groups[0] === 2 && groups[1] === 2) return "Two Pair";
  if (groups[0] === 2)               return "Pair";
  return "High Card";
}
</script>

<script type="text/plain" data-code="blood">
// Maximize matches under scarcity. O is the universal donor, so it's precious —
// serve the most-constrained patients first, and let each take its OWN type
// before falling back to O.
function triageBlood(bank: string[], patients: string[]): string {
  const stock: Record<string, number> = { O: 0, A: 0, B: 0, AB: 0 };
  for (const t of bank) stock[t]++;

  const donorsFor: Record<string, string[]> = {
    O:  ["O"],                 // hardest to satisfy → goes first
    A:  ["A", "O"],
    B:  ["B", "O"],
    AB: ["AB", "A", "B", "O"], // easiest → spends leftovers last
  };

  let served = 0;
  for (const type of ["O", "A", "B", "AB"]) {
    for (const _ of patients.filter(p => p === type)) {
      const donor = donorsFor[type].find(d => stock[d] > 0);
      if (donor) { stock[donor]--; served++; }
    }
  }
  return `${served} of ${patients.length} patients served`;
}
</script>

<script type="text/plain" data-code="dna">
// Position-by-position comparison; collect the indexes that differ.
function detectMutations(strand1: string, strand2: string): number[] {
  const mutations: number[] = [];
  for (let i = 0; i < strand1.length; i++) {
    if (strand1[i] !== strand2[i]) mutations.push(i);
  }
  return mutations;
}
</script>

<script type="text/plain" data-code="sort">
// The whole challenge is one gotcha: Array.prototype.sort() is LEXICOGRAPHIC
// by default, so [12, 2].sort() → [12, 2]. Pass a numeric comparator.
function sortNumbers(str: string): number[] {
  return str.split(",").map(Number).sort((a, b) => a - b);
}

/* ───────────────────────────── 3. PARENTHESES COMBINATIONS ───────────────────────────── */
function mountParens(host) {
  const ctl = el("div", "controls");
  [1, 2, 3, 4].forEach(n => { const b = el("button", "chip" + (n === 3 ? " on" : ""), "n = " + n); b.dataset.n = n; ctl.append(b); });
  const svgBox = el("div"); const out = el("div");
  host.append(ctl, out, svgBox);

  const catalan = n => { let c = 1; for (let i = 0; i < n; i++) c = c * 2 * (2 * i + 1) / (i + 2); return Math.round(c); };

  function build(n) {
    // build tree of states; nodes get id; record pruned stubs
    let id = 0; const nodes = []; const edges = [];
    function rec(open, close, str, depth) {
      const me = { id: id++, str: str || "ε", open, close, depth, leaf: open === n && close === n };
      nodes.push(me);
      if (me.leaf) return me;
      if (open < n) { const ch = rec(open + 1, close, str + "(", depth + 1); edges.push({ from: me.id, to: ch.id, ch: "(" }); }
      else edges.push({ from: me.id, pruned: "(", ch: "(" });
      if (close < open) { const ch = rec(open, close + 1, str + ")", depth + 1); edges.push({ from: me.id, to: ch.id, ch: ")" }); }
      else if (close < n) edges.push({ from: me.id, pruned: ")", ch: ")" });
      return me;
    }
    rec(0, 0, "", 0);
    return { nodes, edges };
  }

  function render(n) {
    const { nodes, edges } = build(n);
    // layout: x by leaf order (in-order), y by depth
    const byId = Object.fromEntries(nodes.map(nd => [nd.id, nd]));
    let leafX = 0; const W = 150;
    const place = nd => {
      const kids = edges.filter(e => e.from === nd.id && e.to != null).map(e => byId[e.to]);
      if (!kids.length) { nd.x = leafX++; return nd.x; }
      const xs = kids.map(place); nd.x = (Math.min(...xs) + Math.max(...xs)) / 2; return nd.x;
    };
    place(nodes[0]);
    const maxDepth = Math.max(...nodes.map(n => n.depth));
    const dx = 92, dy = 64, padX = 30, padY = 26;
    const width = (leafX) * dx + padX * 2;
    const height = (maxDepth + 1) * dy + padY * 2;
    const px = nd => padX + nd.x * dx + dx / 2;
    const py = nd => padY + nd.depth * dy;

    let s = `<svg viewBox="0 0 ${width} ${height}" width="${width}">`;
    edges.forEach(e => {
      if (e.to == null) return;
      const a = byId[e.from], b = byId[e.to];
      const col = e.ch === "(" ? "var(--accent)" : "var(--c5)";
      s += `<line x1="${px(a)}" y1="${py(a) + 9}" x2="${px(b)}" y2="${py(b) - 9}" stroke="${col}" stroke-width="1.5" opacity=".55"/>`;
    });
    edges.forEach(e => { // pruned stubs
      if (e.to != null) return;
      const a = byId[e.from]; const dir = e.pruned === "(" ? -22 : 22;
      s += `<line x1="${px(a)}" y1="${py(a) + 9}" x2="${px(a) + dir}" y2="${py(a) + 30}" stroke="var(--danger)" stroke-width="1.2" stroke-dasharray="3 3" opacity=".5"/>`;
      s += `<text x="${px(a) + dir}" y="${py(a) + 42}" fill="var(--danger)" font-size="10" text-anchor="middle" opacity=".7">✗${e.pruned}</text>`;
    });
    nodes.forEach(nd => {
      const fill = nd.leaf ? "var(--good)" : "var(--panel-2)";
      const stroke = nd.leaf ? "var(--good)" : "var(--border)";
      const tcol = nd.leaf ? "var(--bg)" : "var(--text)";
      const w = Math.max(26, nd.str.length * 9 + 12);
      s += `<g><rect x="${px(nd) - w / 2}" y="${py(nd) - 10}" width="${w}" height="20" rx="6" fill="${fill}" stroke="${stroke}"/>` +
           `<text x="${px(nd)}" y="${py(nd) + 4}" fill="${tcol}" font-family="var(--mono)" font-size="11" font-weight="700" text-anchor="middle">${esc(nd.str)}</text></g>`;
    });
    s += `</svg>`;

    const leaves = nodes.filter(n => n.leaf).length;
    out.innerHTML = "";
    out.append(el("div", "result-line",
      `<span class="big">${leaves}</span><span class="muted">valid combinations (green leaves)</span>` +
      `<span class="badge ok" style="margin-left:6px">= Catalan(${n}) = ${catalan(n)}</span>`));
    out.append(el("div", "note", "Red dashed stubs are moves the rules forbid — adding ')' when none is open, or '(' past n. That pruning is the whole trick: every path that survives reaches a valid string, so the count is just the number of leaves."));
    svgBox.innerHTML = `<div class="panel" style="overflow:auto">${s}</div>`;
  }

  ctl.onclick = e => { if (!e.target.dataset.n) return; [...ctl.children].forEach(c => c.classList.toggle("on", c === e.target)); render(+e.target.dataset.n); };
  render(3);
}

/* ───────────────────────────── 4. PRIME FACTORIZATION ───────────────────────────── */
function mountPrime(host) {
  const ctl = el("div", "controls");
  const inp = el("input"); inp.type = "number"; inp.value = 360; inp.min = 2; inp.style.width = "120px";
  const go = el("button", "chip on", "factorize");
  ctl.append(el("span", "ctl-label", "n ="), inp, go);
  const presets = el("div", "controls");
  [20, 17, 999, 360, 510510].forEach(v => { const c = el("button", "chip", String(v)); c.onclick = () => { inp.value = v; render(); }; presets.append(c); });
  const out = el("div");
  host.append(ctl, presets, out);

  function render() {
    let n = Math.max(2, Math.floor(+inp.value || 2)); const orig = n;
    const steps = []; const factors = [];
    for (let d = 2; d * d <= n; d++) {
      while (n % d === 0) { steps.push({ n, d, hit: true, next: n / d }); factors.push(d); n /= d; }
      if (d * d <= n) steps.push({ n, d: d, hit: false });
    }
    if (n > 1) { factors.push(n); steps.push({ n, d: n, hit: true, last: true, next: 1 }); }

    out.innerHTML = "";
    out.append(el("div", "result-line", `<span class="muted mono">${orig} =</span> ` +
      factors.map(f => `<span class="num right">${f}</span>`).join('<span class="muted"> · </span>')));
    // ladder
    const lad = el("div", "panel"); lad.style.font = "13px var(--mono)";
    lad.append(el("div", "muted", "Trial division — divide out the smallest prime each time:"));
    let cur = orig;
    factors.forEach(f => {
      const row = el("div"); row.style.cssText = "display:flex;gap:10px;align-items:center;padding:3px 0";
      row.innerHTML = `<span class="mono">${cur}</span> <span class="muted">÷</span> <span class="num right" style="padding:2px 7px">${f}</span> <span class="muted">=</span> <span class="mono">${cur / f}</span>`;
      lad.append(row); cur = cur / f;
    });
    out.append(lad);
    out.append(el("div", "note", `Stop dividing once d·d &gt; n: any remainder above 1 must itself be prime. ${orig === 510510 ? "510510 = 2·3·5·7·11·13·17 — the product of the first 7 primes (a “primorial”)." : ""}`));
  }
  go.onclick = render; inp.onkeydown = e => { if (e.key === "Enter") render(); };
  render();
}

/* ───────────────────────────── 6. BEST HAND ───────────────────────────── */
function mountBestHand(host) {
  const RANKS = "23456789TJQKA";
  const SUIT = { h: "♥", d: "♦", c: "♣", s: "♠" }, RED = { h: 1, d: 1 };
  const HANDS = ["High Card", "Pair", "Two Pair", "Three of a Kind", "Straight", "Flush", "Full House", "Four of a Kind", "Straight Flush", "Royal Flush"];
  const cases = [
    ["7s", "7h", "7d", "2c", "5h"], ["Ks", "Kh", "Kd", "4s", "4h"], ["2h", "5h", "7h", "9h", "Jh"],
    ["As", "Ah", "Ad", "Ac", "Kh"], ["Ts", "Th", "9d", "9c", "8h"], ["9c", "8c", "7c", "6c", "5c"],
    ["As", "Kh", "Jd", "8c", "5h"], ["As", "2h", "3d", "4c", "5h"], ["As", "Ks", "Qs", "Js", "Ts"],
  ];
  function evaluate(cards) {
    const values = cards.map(c => RANKS.indexOf(c[0])).sort((a, b) => a - b);
    const suits = cards.map(c => c[1]);
    const groups = [...new Set(values)].map(v => values.filter(x => x === v).length).sort((a, b) => b - a);
    const flush = suits.every(s => s === suits[0]);
    const distinct = new Set(values).size === 5;
    const straight = distinct && (values[4] - values[0] === 4 || values.join() === "0,1,2,3,12");
    let name = "High Card";
    if (straight && flush) name = values[0] === 8 ? "Royal Flush" : "Straight Flush";
    else if (groups[0] === 4) name = "Four of a Kind";
    else if (groups[0] === 3 && groups[1] === 2) name = "Full House";
    else if (flush) name = "Flush";
    else if (straight) name = "Straight";
    else if (groups[0] === 3) name = "Three of a Kind";
    else if (groups[0] === 2 && groups[1] === 2) name = "Two Pair";
    else if (groups[0] === 2) name = "Pair";
    return { name, groups, flush, straight };
  }
  const ctl = el("div", "controls"); const out = el("div");
  host.append(ctl, out);
  let idx = 0;
  cases.forEach((c, i) => { const b = el("button", "chip" + (i === 0 ? " on" : ""), c.join(" ")); b.onclick = () => { idx = i; [...ctl.children].forEach((x, j) => x.classList.toggle("on", j === i)); render(); }; ctl.append(b); });

  function render() {
    const cards = cases[idx]; const r = evaluate(cards);
    out.innerHTML = "";
    const hand = el("div", "hand");
    cards.forEach(c => { const pc = el("div", "pcard" + (RED[c[1]] ? " red" : "")); pc.innerHTML = `<div>${c[0]}</div><div class="s">${SUIT[c[1]]}</div>`; hand.append(pc); });
    out.append(hand);
    out.append(el("div", "result-line",
      `<span class="tag">groups ${JSON.stringify(r.groups)}</span>` +
      `<span class="tag" style="border-color:${r.flush ? "var(--good)" : "var(--border)"}">flush ${r.flush ? "✓" : "✗"}</span>` +
      `<span class="tag" style="border-color:${r.straight ? "var(--good)" : "var(--border)"}">straight ${r.straight ? "✓" : "✗"}</span>`));
    const lad = el("div", "ladder");
    HANDS.slice().reverse().forEach(h => { const rung = el("div", "rung" + (h === r.name ? " on" : "")); rung.innerHTML = `<span>${h}</span>${h === r.name ? '<span>◀ best</span>' : ""}`; lad.append(rung); });
    out.append(lad);
  }
  render();
}

      c.innerHTML = `<h3 style="margin:0 0 8px">${title}</h3>`;
      const u = el("div", "units"); arr.forEach(x => u.append(el("span", "num " + cls, String(x)))); c.append(u);
      c.append(el("div", "muted", note)); c.style.fontSize = "12px";
      return c;
    };
    g.append(col(".sort() — default", wrong, isWrong ? "wrong" : "right", '<code class="inl">[...nums].sort()</code> compares as STRINGS'));
    g.append(col(".sort((a,b)=>a-b) — numeric", right, "right", "the correct comparator"));
    out.append(g);
    out.append(el("div", "note", isWrong
      ? 'See the difference? Default sort coerces to strings, so "12" sorts before "2" and negatives scatter. Always pass a numeric comparator.'
      : "On this input the two happen to agree — try the multi-digit or negative presets to see the default sort break."));
  }
  inp.oninput = render; render();
}

const tabsEl = $("#tabs"), mainEl = $("#main");
let active = loadHash().tab || PROBLEMS[0].id;

PROBLEMS.forEach((p, i) => {

function select(id) {
  active = id;
  $$(".tab").forEach(t => t.classList.toggle("active", t.dataset.id === id));
  $$("section.problem").forEach(s => s.classList.toggle("active", s.dataset.id === id));
  saveHash({ tab: id });
}
